# Configuración de SonarQube para el proyecto
sonar.projectKey=brayan-taller-sast
sonar.projectName=Taller SAST
sonar.projectVersion=1.0

# Fuentes del proyecto
sonar.sources=apps

# Excluir carpetas que no deben analizarse
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.scannerwork/**,**/coverage/**

# Excluir archivos de prueba
sonar.test.exclusions=**/*.spec.ts,**/*.spec.js,**/*.test.ts,**/*.test.js

# Codificación
sonar.sourceEncoding=UTF-8

# URL del servidor SonarQube local
sonar.host.url=http://localhost:9000

# Token de autenticación (debe configurarse como secreto en GitHub Actions)
# sonar.login=your-token-here
