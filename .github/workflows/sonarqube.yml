name: SonarQube Analysis

on:
  push:
    branches:
      - main

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
        if: false  # Desactivar en self-hosted runner (asume Node.js instalado localmente)

      - name: Install dependencies
        run: npm install

      - name: Verify environment
        shell: cmd
        run: |
          echo HOST=%SONAR_HOST_URL%
          if "%SONAR_TOKEN%"=="" (
            echo TOKEN EMPTY
          ) else (
            echo TOKEN FOUND
          )

      - name: SonarQube Scan
        run: |
          sonar-scanner.bat ^
            -D"sonar.projectKey=BrayanTaller-sast" ^
            -D"sonar.sources=." ^
            -D"sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**" ^
            -D"sonar.host.url=%SONAR_HOST_URL%" ^
            -D"sonar.login=%SONAR_TOKEN%"
        shell: cmd

