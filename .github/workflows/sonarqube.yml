name: SonarQube Analysis

on:
  push:
    branches:
      - main

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
        if: false  # Desactivar en self-hosted runner (asume Node.js instalado localmente)

      - name: Install dependencies
        run: npm install

      - name: Install SonarQube Scanner
        run: |
          choco install sonarscanner -y
        shell: powershell

      - name: SonarQube Scan
        run: |
          sonar-scanner -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
        shell: powershell
